<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الإشعارات - اسمع راديو</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Cairo', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #2D8B8B 0%, #237575 100%);
    }
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2D8B8B;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="gradient-bg text-white py-4 px-6 shadow-lg">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold">لوحة تحكم الإشعارات</h1>
          <p class="text-sm text-white/70">اسمع راديو</p>
        </div>
      </div>
      <div class="flex items-center gap-2 text-sm bg-white/10 px-3 py-1.5 rounded-full">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
        <span>متصل</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 space-y-6">
    <!-- Stats Cards -->
    <section id="stats-section" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="stat-card bg-white rounded-2xl p-4 card-shadow">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800" id="total-subscribers">-</p>
            <p class="text-sm text-gray-500">إجمالي المشتركين</p>
          </div>
        </div>
      </div>
      
      <div class="stat-card bg-white rounded-2xl p-4 card-shadow">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"></path>
            </svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800" id="online-users">-</p>
            <p class="text-sm text-gray-500">متصلين الآن</p>
          </div>
        </div>
      </div>
      
      <div class="stat-card bg-white rounded-2xl p-4 card-shadow">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800" id="active-hour">-</p>
            <p class="text-sm text-gray-500">نشطين آخر ساعة</p>
          </div>
        </div>
      </div>
      
      <div class="stat-card bg-white rounded-2xl p-4 card-shadow">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
            </svg>
          </div>
          <div>
            <p class="text-2xl font-bold text-gray-800" id="sent-today">-</p>
            <p class="text-sm text-gray-500">مرسلة اليوم</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Send Notification Form -->
    <section class="bg-white rounded-2xl card-shadow overflow-hidden">
      <div class="gradient-bg p-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
          إرسال إشعار جديد
        </h2>
      </div>
      
      <form id="notification-form" class="p-6 space-y-5">
        <!-- Send Type -->
        <div class="flex gap-3 mb-4">
          <button type="button" id="btn-broadcast" class="flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-[#2D8B8B] text-white">
            إرسال للجميع
          </button>
          <button type="button" id="btn-specific" class="flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-gray-100 text-gray-600 hover:bg-gray-200">
            إرسال لمستخدم محدد
          </button>
        </div>

        <!-- User Selection (hidden by default) -->
        <div id="user-selection" class="hidden">
          <label class="block text-sm font-medium text-gray-700 mb-2">اختر المستخدم</label>
          <select id="user-select" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D8B8B] focus:border-transparent">
            <option value="">جاري التحميل...</option>
          </select>
        </div>

        <!-- Title -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">عنوان الإشعار *</label>
          <input type="text" id="notification-title" required
            class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D8B8B] focus:border-transparent"
            placeholder="مثال: محطة جديدة متاحة الآن">
        </div>

        <!-- Body -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">نص الإشعار *</label>
          <textarea id="notification-body" required rows="3"
            class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D8B8B] focus:border-transparent"
            placeholder="اكتب محتوى الإشعار هنا..."></textarea>
        </div>

        <!-- Custom Image -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">صورة مخصصة (اختياري)</label>
          <div class="flex gap-3">
            <input type="file" id="notification-image" accept="image/*"
              class="flex-1 p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D8B8B] focus:border-transparent file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-[#2D8B8B] file:text-white hover:file:bg-[#237575]">
          </div>
          <p class="text-xs text-gray-500 mt-1">الحجم الأقصى: 2MB. الصيغ: JPG, PNG, GIF</p>
          <div id="image-preview" class="mt-3 hidden">
            <img id="preview-img" class="max-w-xs rounded-xl border" alt="معاينة">
          </div>
        </div>

        <!-- Link -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">رابط عند الضغط (اختياري)</label>
          <input type="url" id="notification-url"
            class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2D8B8B] focus:border-transparent"
            placeholder="https://example.com أو /station/123">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="send-btn"
          class="w-full py-4 bg-[#2D8B8B] hover:bg-[#237575] text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
          إرسال الإشعار
        </button>
      </form>
    </section>

    <!-- Result Section -->
    <section id="result-section" class="hidden bg-white rounded-2xl card-shadow p-6 fade-in">
      <div id="result-content"></div>
    </section>

    <!-- Subscribers List -->
    <section class="bg-white rounded-2xl card-shadow overflow-hidden">
      <div class="p-4 border-b flex items-center justify-between">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <svg class="w-5 h-5 text-[#2D8B8B]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
          قائمة المستخدمين
        </h2>
        <span id="users-count" class="text-sm text-gray-500">0 مستخدم</span>
      </div>
      <div id="users-list" class="max-h-96 overflow-y-auto">
        <div class="p-8 text-center text-gray-400">
          <div class="loader mx-auto mb-3"></div>
          <p>جاري تحميل المستخدمين...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 bg-gray-800 text-white p-4 rounded-xl shadow-lg transform translate-y-full opacity-0 transition-all duration-300">
    <div class="flex items-center gap-3">
      <div id="toast-icon"></div>
      <div id="toast-message"></div>
    </div>
  </div>

  <script>
    // Configuration
    const API_KEY = 'asmae-radio-admin-2024-secure';
    let sendMode = 'broadcast'; // 'broadcast' or 'specific'
    let uploadedImageUrl = null;

    // DOM Elements
    const form = document.getElementById('notification-form');
    const sendBtn = document.getElementById('send-btn');
    const resultSection = document.getElementById('result-section');
    const resultContent = document.getElementById('result-content');
    const btnBroadcast = document.getElementById('btn-broadcast');
    const btnSpecific = document.getElementById('btn-specific');
    const userSelection = document.getElementById('user-selection');
    const userSelect = document.getElementById('user-select');
    const imageInput = document.getElementById('notification-image');
    const imagePreview = document.getElementById('image-preview');
    const previewImg = document.getElementById('preview-img');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      fetchStats();
      fetchUsers();
      setInterval(fetchStats, 30000); // Refresh stats every 30s
    });

    // Mode Toggle
    btnBroadcast.addEventListener('click', () => {
      sendMode = 'broadcast';
      btnBroadcast.className = 'flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-[#2D8B8B] text-white';
      btnSpecific.className = 'flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-gray-100 text-gray-600 hover:bg-gray-200';
      userSelection.classList.add('hidden');
    });

    btnSpecific.addEventListener('click', () => {
      sendMode = 'specific';
      btnSpecific.className = 'flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-[#2D8B8B] text-white';
      btnBroadcast.className = 'flex-1 py-3 px-4 rounded-xl font-medium transition-all bg-gray-100 text-gray-600 hover:bg-gray-200';
      userSelection.classList.remove('hidden');
    });

    // Image Upload Preview
    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) {
        // Show preview
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          imagePreview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);

        // Upload image
        showToast('جاري رفع الصورة...', 'loading');
        const formData = new FormData();
        formData.append('file', file);

        try {
          const response = await fetch('/api/notifications/upload-image', {
            method: 'POST',
            body: formData
          });
          const data = await response.json();

          if (data.success) {
            uploadedImageUrl = data.url;
            showToast('تم رفع الصورة بنجاح', 'success');
          } else {
            showToast('خطأ في رفع الصورة: ' + data.error, 'error');
            imagePreview.classList.add('hidden');
          }
        } catch (error) {
          showToast('خطأ في رفع الصورة: ' + error.message, 'error');
          imagePreview.classList.add('hidden');
        }
      }
    });

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('notification-title').value;
      const body = document.getElementById('notification-body').value;
      const url = document.getElementById('notification-url').value;

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<div class="loader"></div> جاري الإرسال...';

      try {
        let response;
        
        if (sendMode === 'broadcast') {
          // Send to all
          response = await fetch('/api/notifications/broadcast', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title,
              body,
              icon: uploadedImageUrl,
              url
            })
          });
        } else {
          // Send to specific user
          const userId = userSelect.value;
          if (!userId) {
            showToast('الرجاء اختيار مستخدم', 'error');
            sendBtn.disabled = false;
            sendBtn.innerHTML = 'إرسال الإشعار';
            return;
          }

          response = await fetch('/api/admin/send', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
              userId,
              title,
              body,
              icon: uploadedImageUrl,
              url
            })
          });
        }

        const data = await response.json();
        
        if (response.ok && data.success !== false) {
          showResult(data);
          showToast(`تم إرسال ${data.sent || 0} إشعار بنجاح`, 'success');
          form.reset();
          imagePreview.classList.add('hidden');
          uploadedImageUrl = null;
        } else {
          showToast('خطأ: ' + (data.error || 'فشل الإرسال'), 'error');
        }
      } catch (error) {
        showToast('خطأ في الاتصال: ' + error.message, 'error');
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerHTML = `
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
          إرسال الإشعار
        `;
      }
    });

    // Fetch Stats
    async function fetchStats() {
      try {
        const response = await fetch('/api/admin/stats', {
          headers: { 'Authorization': `Bearer ${API_KEY}` }
        });
        const data = await response.json();

        if (data.success) {
          document.getElementById('total-subscribers').textContent = data.stats.totalSubscribers;
          document.getElementById('online-users').textContent = data.stats.onlineUsers;
          document.getElementById('active-hour').textContent = data.stats.activeLastHour;
          document.getElementById('sent-today').textContent = data.stats.notificationsSentToday;
        }
      } catch (error) {
        console.error('Error fetching stats:', error);
      }
    }

    // Fetch Users
    async function fetchUsers() {
      try {
        const response = await fetch('/api/notifications/subscribers', {
          headers: { 'x-api-key': API_KEY }
        });
        const data = await response.json();

        if (data.success) {
          renderUsers(data.users);
          document.getElementById('users-count').textContent = `${data.users.length} مستخدم`;
          
          // Populate select
          userSelect.innerHTML = '<option value="">اختر مستخدم...</option>';
          data.users.forEach(user => {
            const option = document.createElement('option');
            option.value = user.name;
            option.textContent = `${user.name} (${user.devices} أجهزة)`;
            userSelect.appendChild(option);
          });
        }
      } catch (error) {
        document.getElementById('users-list').innerHTML = `
          <div class="p-8 text-center text-red-400">
            <p>خطأ في تحميل المستخدمين</p>
          </div>
        `;
      }
    }

    // Render Users
    function renderUsers(users) {
      const container = document.getElementById('users-list');
      
      if (users.length === 0) {
        container.innerHTML = `
          <div class="p-8 text-center text-gray-400">
            <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <p>لا يوجد مشتركين بعد</p>
          </div>
        `;
        return;
      }

      container.innerHTML = users.map(user => {
        const isNew = user.isNew;
        const timeSince = formatTimeSince(user.firstSeen);
        
        return `
          <div class="p-4 border-b hover:bg-gray-50 transition-colors flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#2D8B8B] to-[#237575] flex items-center justify-center text-white font-bold">
                ${user.name.charAt(0)}
              </div>
              <div>
                <div class="flex items-center gap-2">
                  <span class="font-medium">${user.name}</span>
                  ${isNew ? '<span class="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">جديد</span>' : ''}
                </div>
                <div class="text-xs text-gray-500">
                  <span>${user.devices} أجهزة</span>
                  <span class="mx-1">•</span>
                  <span>منذ ${timeSince}</span>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-2">
              ${user.platforms.map(p => `
                <span class="text-xs bg-gray-100 px-2 py-1 rounded">${p || 'web'}</span>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    // Show Result
    function showResult(data) {
      resultSection.classList.remove('hidden');
      resultContent.innerHTML = `
        <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-4">
          <div class="flex items-center gap-2 text-green-700 mb-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <span class="font-bold">تم الإرسال بنجاح!</span>
          </div>
          <div class="grid grid-cols-3 gap-4 text-center mt-4">
            <div>
              <p class="text-2xl font-bold text-green-700">${data.sent || 0}</p>
              <p class="text-sm text-gray-500">تم الإرسال</p>
            </div>
            <div>
              <p class="text-2xl font-bold text-gray-700">${data.total || 0}</p>
              <p class="text-sm text-gray-500">إجمالي</p>
            </div>
            <div>
              <p class="text-2xl font-bold text-red-500">${data.failed || 0}</p>
              <p class="text-sm text-gray-500">فشل</p>
            </div>
          </div>
        </div>
        ${data.details?.failureReasons?.length ? `
          <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
            <p class="font-medium text-yellow-700 mb-2">أسباب الفشل:</p>
            <ul class="text-sm text-yellow-600 list-disc list-inside">
              ${data.details.failureReasons.map(r => `<li>${r}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
      `;
    }

    // Show Toast
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msg = document.getElementById('toast-message');

      const icons = {
        success: '<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>',
        error: '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',
        loading: '<div class="loader" style="width:20px;height:20px;border-width:2px;border-top-color:#2D8B8B"></div>',
        info: '<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
      };

      icon.innerHTML = icons[type] || icons.info;
      msg.textContent = message;

      toast.classList.remove('translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.add('translate-y-full', 'opacity-0');
        toast.classList.remove('translate-y-0', 'opacity-100');
      }, 3000);
    }

    // Format Time Since
    function formatTimeSince(date) {
      const now = new Date();
      const d = new Date(date);
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'الآن';
      if (diffMins < 60) return `${diffMins} دقيقة`;
      if (diffHours < 24) return `${diffHours} ساعة`;
      if (diffDays < 7) return `${diffDays} يوم`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)} أسبوع`;
      return `${Math.floor(diffDays / 30)} شهر`;
    }
  </script>
